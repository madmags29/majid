<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#ec4899" />
        </linearGradient>
    </defs>
    <!-- Thicker, more visible orbit -->
    <circle cx="50" cy="50" r="44" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="3" />
    <!-- Bolder, Larger Fluid W -->
    <path d="M12 50 Q 31 10 50 50 Q 69 90 88 50" 
          stroke="url(#logoGradient)" stroke-width="14" stroke-linecap="round" />
    <!-- Bolder Voyager Tip -->
    <path d="M88 50 L75 40 M88 50 L75 60" 
          stroke="currentColor" stroke-width="6" stroke-linecap="round" />
</svg>
